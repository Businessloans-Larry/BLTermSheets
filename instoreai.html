<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Offer Closed — InStore AI Inc</title>
<meta name="robots" content="noindex"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#002F68;--navy2:#1A2763;--green:#00CD67;--green-d:#00A352;--slate:#485282;--bg:#F6F6F9;--line:#E8E9EF;}
*{box-sizing:border-box;}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--navy2);-webkit-font-smoothing:antialiased;}
.card{max-width:540px;width:100%;background:#fff;border:1px solid var(--line);border-top:5px solid var(--green);
  border-radius:16px;box-shadow:0 10px 34px rgba(0,47,104,.08);padding:46px 40px;text-align:center;}
.brand{font-family:'DM Serif Display',Georgia,serif;font-size:21px;color:var(--navy);margin-bottom:26px;letter-spacing:.01em;}
.brand span{color:var(--green-d);}
.badge{display:inline-block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  color:var(--green-d);background:rgba(0,205,103,.12);border:1.5px solid var(--green);border-radius:20px;padding:5px 14px;margin-bottom:18px;}
h1{font-family:'DM Serif Display',Georgia,serif;font-size:29px;line-height:1.15;color:var(--navy);margin:0 0 14px;}
p{font-size:15px;color:var(--slate);line-height:1.65;margin:0 0 10px;}
p b{color:var(--navy);}
.foot{margin-top:26px;padding-top:18px;border-top:1px solid var(--line);font-size:12px;color:var(--slate);}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">BusinessLoans<span>.com</span></div>
    <div class="badge">Offer Closed</div>
    <h1>This offer is no longer available</h1>
    <p>The funding offer for <b>InStore AI Inc</b> has been completed and is no longer active.</p>
    <p>If you have any questions, please reach out to your BusinessLoans.com representative.</p>
    <div class="foot">BusinessLoans.com &middot; Thank you for your business.</div>
  </div>
</body></html>
